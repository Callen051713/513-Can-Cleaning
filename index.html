<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>513 Can Cleaning</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #06084a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

.card {
  width: 100%;
  max-width: 660px;
  border-radius: 12px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: radial-gradient(ellipse 80% 90% at 50% 50%,
    #1510e4 0%,
    #110db8 30%,
    #0d0c8a 60%,
    #0d0c6e 100%);
}

.stripe {
  background: #d4891a;
  height: 5px;
}

.body {
  display: grid;
  grid-template-columns: 210px 1fr;
  min-height: 280px;
}

.left {
  padding: 16px 12px;
  border-right: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-img {
  width: 100%;
  max-width: 180px;
  height: auto;
  display: block;
}

.right {
  padding: 28px 28px 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.pricing-row {
  display: flex;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  overflow: hidden;
}

.price-cell {
  flex: 1;
  text-align: center;
  padding: 9px 6px;
  border-right: 1px solid rgba(255,255,255,0.2);
}

.price-cell:last-child { border-right: none; }

.price-amt {
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  color: #fff;
  line-height: 1;
}

.price-qty {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}

.book-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #d4891a;
  border-radius: 6px;
  padding: 12px 16px;
  text-decoration: none;
  transition: background 0.15s;
}

.book-btn:hover { background: #e89920; }

.phone-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  fill: rgba(58,21,0,0.75);
}

.book-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(58,21,0,0.65);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.book-number {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  color: #1a0800;
  letter-spacing: 1px;
}

.features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px 12px;
}

.feat {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  line-height: 1.3;
}

.feat::before {
  content: '';
  width: 4px;
  height: 4px;
  background: #d4891a;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}

.bottom {
  background: rgba(0,0,0,0.18);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slogan {
  font-family: 'Anton', sans-serif;
  font-size: 18px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.slogan span {
  color: #d4891a;
}

@media (max-width: 480px) {
  .body { grid-template-columns: 1fr; }
  .left {
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 20px;
  }
  .logo-img { max-width: 160px; }
  .features { grid-template-columns: 1fr; }
}
</style>
</head>
